name: Build ESPHome Firmware
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: esphome/build-action@v7
        with:
          yaml-file: touchtest.yaml
          
      - uses: actions/upload-artifact@v4
        with:
          name: xiao-firmware
          path: "**/*.bin"
